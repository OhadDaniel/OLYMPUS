# Render Blueprint for the MAXWELL backend (NestJS API + read-only MCP subprocess
# + Telegram rhythm + crons). MongoDB is external (Atlas). Deploy via
# Render dashboard → New + → Blueprint → pick the OhadDaniel/OLYMPUS repo.
#
# Secrets (sync:false) are entered once in the Render dashboard — never committed.
services:
  - type: web
    name: maxwell-api
    runtime: node
    plan: free # bump to "starter" for always-on (so the morning/evening rhythm + crons fire on time)
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /onboarding/status
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAXWELL_LOG
        value: stdout
      - key: TZ_DEFAULT
        value: Asia/Jerusalem
      - key: APP_URL # the deployed front end (for CORS + the post-OAuth redirect)
        value: https://maxwell-app-nu.vercel.app
      - key: API_URL # THIS service's own public URL — set after you name it (e.g. https://maxwell-api.onrender.com)
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
